name: Publish Kits

on:
  workflow_dispatch:
    inputs:
      sbx_release:
        description: "docker/sbx-releases tag to install"
        required: true
        default: "v0.33.0"

permissions:
  contents: read

jobs:
  publish-kits:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SBX
        env:
          GH_TOKEN: ${{ github.token }}
          SBX_RELEASE: ${{ inputs.sbx_release }}
        run: |
          set -euo pipefail
          gh release download "$SBX_RELEASE" \
            --repo docker/sbx-releases \
            --pattern 'DockerSandboxes-linux-amd64-ubuntu2404.deb' \
            --output /tmp/docker-sandboxes.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/docker-sandboxes.deb
          sbx version

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish kit artifact
        env:
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
        run: ./scripts/push-kits.sh
